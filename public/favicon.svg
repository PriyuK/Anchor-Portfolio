<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FFA500" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="30" fill="#07050A" stroke="url(#gold)" stroke-width="3"/>
  <text x="50%" y="54%" font-family="Georgia, serif" font-size="58" font-style="italic" font-weight="900" fill="url(#gold)" text-anchor="middle" dominant-baseline="central" filter="url(#glow)">AR</text>
  <circle cx="95" cy="85" r="8" fill="#FFF" />
</svg>